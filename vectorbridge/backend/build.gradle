plugins {
    id 'java'
    id 'application'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'com.vectorbridge.App'
}

repositories {
    mavenCentral()
}

dependencies {
    // Jersey with built-in Jetty — no manual wiring needed
    implementation 'org.glassfish.jersey.containers:jersey-container-jetty-http:3.1.3'
    implementation 'org.glassfish.jersey.inject:jersey-hk2:3.1.3'
    implementation 'org.glassfish.jersey.media:jersey-media-json-jackson:3.1.3'

    implementation 'jakarta.servlet:jakarta.servlet-api:5.0.0'

    // Jackson
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'

    // Logging
    implementation 'org.apache.logging.log4j:log4j-core:2.20.0'
    implementation 'org.apache.logging.log4j:log4j-slf4j2-impl:2.20.0'
    implementation 'org.slf4j:slf4j-api:2.0.7'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.vectorbridge.App'
    }
}